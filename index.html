<!DOCTYPE html>
<html lang="ja">
<!--
  漢字クロスパズル PUBLIC v3
  ✅ APIキー不要・完全無料
  ✅ 内蔵辞書600語 → 本心・上手・左右 etc. 即判定
  ✅ 未収録語はJisho.orgで補完
  ✅ Netlify Dropで30秒公開: https://app.netlify.com/drop
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>漢字クロスパズル</title>
<style>
:root{--bg:#04060f;--bg2:#080d1e;--sur:#111827;--sur2:#1a2035;--bdr:#1e2d4a;--bdr2:#263352;--vio:#7c3aed;--viol:#a78bfa;--blu:#3b82f6;--grn:#10b981;--grnl:#6ee7b7;--gld:#d4a017;--gldl:#fcd34d;--red:#ef4444;--redl:#fca5a5;--amb:#f59e0b;--ambl:#fcd34d;--txt:#e2e8f0;--txt2:#94a3b8;--txt3:#475569}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;user-select:none;overflow-x:hidden}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes hintPulse{0%,100%{box-shadow:0 0 8px var(--gld)}50%{box-shadow:0 0 22px var(--gld),0 0 40px var(--gld)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
#map-screen{padding:18px 14px 30px;max-width:520px;margin:0 auto;width:100%;display:block}
#game-screen{padding:10px 12px 80px;max-width:440px;margin:0 auto;width:100%;display:none}
.title-grad{background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399,#a78bfa);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;font-size:clamp(20px,6vw,28px);font-weight:900;letter-spacing:1px}
.map-box{background:var(--bg2);border-radius:16px;padding:14px 10px;border:1px solid var(--bdr)}
.map-row{display:flex;align-items:center;margin-bottom:4px}
.h-line{flex:1;height:2px;background:var(--bdr2)}
.v-wrap{height:8px;display:flex;align-items:center}.v-line{width:2px;height:8px;background:var(--bdr2)}
.snode{width:50px;height:50px;border-radius:50%;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;padding:0;background:transparent;flex-shrink:0;font-family:inherit}
.snode:disabled{cursor:not-allowed}.snode.cur{animation:pulse 2s infinite}.snode:not(:disabled):hover{transform:scale(1.12)}
.snode .se{font-size:15px}.snode .si{font-size:8px;font-weight:700;opacity:.7}
.stats-box{background:var(--bg2);border-radius:12px;padding:12px 16px;border:1px solid var(--bdr);margin-top:14px}
.prog-track{background:var(--sur2);border-radius:3px;height:5px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:3px;transition:width .6s}
.ghdr{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.bsm{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;color:var(--txt2);padding:7px 10px;cursor:pointer;font-size:12px;white-space:nowrap;font-family:inherit;transition:background .2s}.bsm:hover{background:var(--sur2)}
.bsm.vb{color:var(--ambl);border-color:rgba(245,158,11,.4)}
.prog-wrap{background:var(--bg2);border-radius:8px;padding:7px 12px;border:1px solid var(--bdr);display:flex;align-items:center;gap:10px;margin-bottom:7px}
.frac{font-weight:700;font-size:14px;white-space:nowrap}.fn{color:var(--grnl)}.sep{color:var(--txt3);margin:0 1px}.tn{color:var(--txt2)}
.wdisp{height:38px;background:var(--bg2);border-radius:8px;border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;margin-bottom:7px;font-size:20px;font-weight:700;letter-spacing:4px;transition:all .15s}
.wdisp.act{border-color:rgba(124,58,237,.6)}.wdisp .ht{font-size:11px;color:var(--txt3);letter-spacing:0;font-weight:400}
#kg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:var(--bg2);border-radius:14px;padding:10px;border:1px solid var(--bdr);margin-bottom:7px;touch-action:none;cursor:crosshair}
.kc{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(15px,4.5vw,25px);font-weight:700;border-radius:8px;border:2px solid var(--bdr);background:var(--sur);color:var(--txt);transition:all .1s;cursor:crosshair}
.kc.sel{background:rgba(124,58,237,.3)!important;border-color:var(--vio)!important;color:var(--viol)!important;transform:scale(1.07)!important;box-shadow:0 0 12px rgba(124,58,237,.45)!important}
.kc.fc{background:rgba(16,185,129,.1)!important;border-color:rgba(16,185,129,.35)!important;color:var(--grnl)!important}
.kc.hc{background:rgba(212,160,23,.2)!important;border-color:var(--gld)!important;color:var(--gldl)!important;animation:hintPulse .8s infinite!important}
.kc.gc{background:rgba(239,68,68,.1)!important;border-color:rgba(239,68,68,.3)!important;color:var(--redl)!important}
.arow{display:flex;gap:6px;margin-bottom:7px}
.ab{flex:1;border:1px solid;border-radius:8px;padding:8px 6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.ab:disabled{opacity:.4;cursor:not-allowed}
.hb{background:rgba(212,160,23,.08);border-color:rgba(212,160,23,.4);color:var(--gldl)}.hb:not(:disabled):hover{background:rgba(212,160,23,.15)}
.gb{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.35);color:var(--redl)}.gb:not(:disabled):hover{background:rgba(239,68,68,.14)}
.fbk{border-radius:8px;padding:7px 12px;margin-bottom:7px;animation:slideUp .25s ease}
.fok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.35)}
.ferr{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.35)}
.fok .fw{font-size:17px;font-weight:700;color:var(--grnl)}.fok .fr{font-size:11px;color:var(--txt2);margin-left:6px}.fok .fm{font-size:11px;color:var(--txt2);margin-top:2px}
.ferr .fe{color:var(--redl);font-size:12px}
.sp{width:13px;height:13px;border:2px solid var(--vio);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:5px}
.fwrap{background:var(--bg2);border-radius:8px;padding:8px 10px;border:1px solid var(--bdr)}
.fwlbl{color:var(--txt3);font-size:10px;margin-bottom:5px}.fwchips{display:flex;flex-wrap:wrap;gap:5px}
.chip{border-radius:6px;padding:3px 7px;animation:pop .3s ease;display:flex;align-items:center;gap:5px;cursor:pointer;transition:background .15s}
.chip.n{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.35)}.chip.n:hover{background:rgba(16,185,129,.2)}
.chip.g{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25)}
.chip .cw{font-weight:700;font-size:14px}.chip.n .cw{color:var(--grnl)}.chip.g .cw{color:var(--redl)}
.chip .cr{font-size:9px;color:var(--txt3)}
.ccp{width:18px;height:18px;border:1px solid currentColor;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;opacity:.6;flex-shrink:0}.ccp:hover{opacity:1}
#wmod{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
#wmod.open{display:flex}
.wmbox{background:var(--bg2);border-radius:18px;padding:24px 20px;max-width:340px;width:100%;border:1px solid var(--bdr2);animation:pop .3s ease;max-height:85vh;overflow-y:auto}
.wmw{font-size:36px;font-weight:900;color:var(--grnl);letter-spacing:2px}
.wmr{font-size:14px;color:var(--txt2);margin-top:2px}
.wmbadges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.badge{border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;border:1px solid}
.badge.jlpt{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.4);color:var(--viol)}
.badge.common{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:var(--grnl)}
.wmsenses{margin-top:10px}
.sense{padding:6px 10px;background:var(--sur);border-radius:8px;border:1px solid var(--bdr);margin-bottom:4px}
.pos{font-size:9px;font-weight:700;color:var(--ambl);background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:4px;padding:1px 5px;margin-right:6px;vertical-align:middle}
.meaning{font-size:13px;color:var(--txt);line-height:1.5;vertical-align:middle}
.sinfo{font-size:10px;color:var(--txt3);margin-left:6px;font-style:italic}
.wmlbl{font-size:10px;color:var(--txt3);margin-top:12px;margin-bottom:5px}
.example{padding:8px 10px;background:var(--sur);border-radius:8px;border:1px solid var(--bdr);margin-bottom:5px}
.ex-ja{font-size:13px;color:var(--txt);line-height:1.7}.ex-ja mark{background:rgba(124,58,237,.3);color:var(--viol);border-radius:3px;padding:0 2px}
.ex-en{font-size:11px;color:var(--txt3);margin-top:3px;line-height:1.5}
.ex-link{display:block;padding:8px 12px;background:var(--sur);border-radius:8px;border:1px solid var(--bdr);color:var(--txt2);text-decoration:none;font-size:12px;transition:background .2s}.ex-link:hover{background:var(--sur2)}
.wmextlinks{display:flex;gap:6px;margin-top:10px}
.extlink{flex:1;padding:7px;border:1px solid var(--bdr);border-radius:8px;color:var(--txt2);text-decoration:none;font-size:11px;text-align:center;background:var(--sur);transition:background .2s}.extlink:hover{background:var(--sur2)}
.ldg{color:var(--txt3);font-size:12px;padding:8px 0;text-align:center}
.no-data{color:var(--txt3);font-size:12px;padding:8px 10px;font-style:italic}
.wmbtns{display:flex;gap:7px;margin-top:14px}
.wmbtn{flex:1;border-radius:9px;padding:9px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;border:1px solid;transition:all .2s}
.wmcp{background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.4);color:#93c5fd}.wmcp:hover{background:rgba(59,130,246,.16)}
.wmsv{background:rgba(212,160,23,.08);border-color:rgba(212,160,23,.4);color:var(--gldl)}.wmsv:hover{background:rgba(212,160,23,.16)}
.wmcl{background:var(--sur2);border-color:var(--bdr);color:var(--txt2)}.wmcl:hover{background:var(--bdr)}
#voc{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;z-index:250;overflow:hidden}
#voc.open{display:flex}
.vhdr{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--bdr);background:var(--bg2);flex-shrink:0}
.vbody{flex:1;overflow-y:auto;padding:12px}.vempty{text-align:center;color:var(--txt3);font-size:13px;margin-top:40px}
.vlg{margin-bottom:16px}.vll{font-size:11px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.vcard{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px}
.vm{flex:1;min-width:0}.vw{font-size:20px;font-weight:700;color:var(--grnl)}.vr{font-size:12px;color:var(--txt2)}.vmm{font-size:12px;color:var(--txt);margin-top:4px}
.vcb{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.vcbtn{border:1px solid var(--bdr);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:10px;background:transparent;color:var(--txt2);font-family:inherit;white-space:nowrap}.vcbtn:hover{background:var(--sur2)}
.vdel{color:var(--redl);border-color:rgba(239,68,68,.3)}
#cmod{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
#cmod.open{display:flex}
.cbox{background:var(--bg2);border-radius:20px;padding:26px 20px;text-align:center;max-width:300px;width:100%;border:1px solid var(--vio);box-shadow:0 0 40px rgba(124,58,237,.25);animation:pop .4s ease}
.cchips{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:16px}
.cchip{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.35);border-radius:4px;padding:1px 7px;color:var(--grnl);font-size:12px;font-weight:700}
.cchip.g{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:var(--redl)}
.cbtns{display:flex;gap:7px;justify-content:center}
.cmap{background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;color:var(--txt2);padding:9px 15px;cursor:pointer;font-size:13px;font-family:inherit}
.cnxt{background:linear-gradient(135deg,var(--vio),var(--blu));border:none;border-radius:10px;color:#fff;padding:9px 18px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.gload{aspect-ratio:1;max-height:280px;background:var(--bg2);border-radius:14px;border:1px solid var(--bdr);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;margin-bottom:7px}
.bspin{width:38px;height:38px;border-width:3px;border-style:solid;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
#toast{position:fixed;bottom:70px;left:50%;transform:translate(-50%,0);background:var(--sur2);border:1px solid var(--bdr2);border-radius:20px;padding:8px 18px;font-size:12px;color:var(--txt);z-index:400;display:none;white-space:nowrap;max-width:90vw;text-align:center}
.lb{border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700;border:1px solid;display:inline-block}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
/* ── Audio / BGM ── */
.bgmbtn{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.3);border-radius:8px;color:#93c5fd;padding:6px 10px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s;white-space:nowrap}
.bgmbtn.off{opacity:.45;color:var(--txt3)}
/* ── Map character ── */
#mchar{position:absolute;font-size:22px;transition:left .75s cubic-bezier(.34,1.56,.64,1),top .75s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:10;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6))}
@keyframes charBob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-5px) rotate(3deg)}}
.char-idle{animation:charBob 1.8s ease-in-out infinite}
@keyframes charWalk{0%{transform:scaleX(1)}50%{transform:scaleX(-1)}100%{transform:scaleX(1)}}
/* ── Complete modal redesign ── */
.cbox{background:var(--bg2);border-radius:20px;padding:20px 18px;text-align:center;max-width:320px;width:100%;border:1px solid var(--vio);box-shadow:0 0 40px rgba(124,58,237,.25);animation:pop .4s ease;max-height:90vh;overflow-y:auto}
.cmod-words{background:var(--sur);border-radius:10px;padding:8px 8px 4px;margin:10px 0;text-align:left;max-height:180px;overflow-y:auto}
.cword-lbl{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.cword-lbl span{font-size:10px;color:var(--txt3)}
.saveall-btn{background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.35);color:var(--gldl);border-radius:6px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:inherit}
.cword-row{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;cursor:pointer;transition:background .15s;border:1px solid transparent;margin-bottom:3px}
.cword-row:hover{background:var(--sur2);border-color:var(--bdr)}
.cwrd{font-weight:700;font-size:15px;color:var(--grnl)}.cword-row.g .cwrd{color:var(--redl)}
.crdr{font-size:10px;color:var(--txt3)}
.csavebtn{margin-left:auto;background:transparent;border:1px solid rgba(212,160,23,.3);border-radius:5px;color:var(--gldl);padding:2px 6px;cursor:pointer;font-size:10px;font-family:inherit;flex-shrink:0}
.csavebtn:hover{background:rgba(212,160,23,.15)}.csavebtn.saved{color:var(--grn);border-color:rgba(16,185,129,.3)}
/* ── Word modal: POS badges ── */
.wmbadges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.badge{border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;border:1px solid}
.badge.jlpt{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.4);color:var(--viol)}
.badge.common{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:var(--grnl)}
.wmsenses{margin-top:8px}
.sense{padding:6px 10px;background:var(--sur);border-radius:8px;border:1px solid var(--bdr);margin-bottom:4px}
.pos{font-size:9px;font-weight:700;color:var(--ambl);background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:4px;padding:1px 5px;margin-right:6px;vertical-align:middle}
.meaning{font-size:13px;color:var(--txt);line-height:1.5;vertical-align:middle}
.sinfo{font-size:10px;color:var(--txt3);margin-left:4px;font-style:italic}
.example{padding:8px 10px;background:var(--sur);border-radius:8px;border:1px solid var(--bdr);margin-bottom:5px}
.ex-ja{font-size:13px;color:var(--txt);line-height:1.7}.ex-ja mark{background:rgba(124,58,237,.3);color:var(--viol);border-radius:3px;padding:0 2px}
.ex-en{font-size:11px;color:var(--txt3);margin-top:3px;line-height:1.5}
.ex-link{display:block;padding:8px 12px;background:var(--sur);border-radius:8px;border:1px solid var(--bdr);color:var(--txt2);text-decoration:none;font-size:12px;transition:background .2s}.ex-link:hover{background:var(--sur2)}
.wmextlinks{display:flex;gap:5px;margin-top:10px}
.extlink{flex:1;padding:6px 4px;border:1px solid var(--bdr);border-radius:8px;color:var(--txt2);text-decoration:none;font-size:10px;text-align:center;background:var(--sur);transition:background .2s;white-space:nowrap}.extlink:hover{background:var(--sur2)}
.ldg{color:var(--txt3);font-size:12px;padding:8px 0;text-align:center}
.no-data{color:var(--txt3);font-size:12px;padding:8px 10px;font-style:italic}
</style>
</head>
<body>
<div id="map-screen">
  <div style="text-align:center;margin-bottom:16px;position:relative">
    <div class="title-grad">漢字クロスパズル</div>
    <div style="color:var(--txt3);font-size:11px;margin-top:3px">JLPT N5→N1 漢字ワード探しゲーム</div>
    <button class="bgmbtn" id="mapbgmbtn" onclick="toggleBGM()" style="position:absolute;right:0;top:4px">🔊 BGM</button>
  </div>
  <div style="display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="legend"></div>
  <div style="position:relative">
    <div class="map-box" id="smap"></div>
    <div id="mchar" class="char-idle">🧑‍🎓</div>
  </div>
  <div class="stats-box">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="color:var(--txt2);font-size:12px">クリア済み</span>
      <span style="font-weight:700;font-size:13px" id="sdone">0 / 25</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="sbar" style="width:0%;background:linear-gradient(90deg,var(--vio),var(--blu),var(--grn))"></div></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:10px">
      <button onclick="openVoc()" style="background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.35);color:var(--ambl);border-radius:8px;padding:6px 16px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600">📚 単語帳</button>
      <button onclick="resetProg()" style="background:transparent;border:1px solid var(--bdr);color:var(--txt3);border-radius:6px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:inherit">リセット</button>
    </div>
  </div>
</div>

<div id="game-screen">
  <div class="ghdr">
    <button class="bsm" onclick="showMap()">← Map</button>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap" id="shdr"></div>
      <div style="color:var(--txt3);font-size:10px" id="sgoal"></div>
    </div>

    if(placed.length>=8)break;

    if(kk.some(k=>used.has(k)))continue;

    for(let r=0;r<5;r++)for(let c=0;c<5;c++)for(const[dr,dc]of DIRS){

      if(ok)spots.push(cells);
    }
    if(!spots.length)continue;
    const chosen=spots[Math.floor(Math.random()*spots.length)];
    chosen.forEach(([nr,nc],i)=>{g[nr][nc]=kk[i];used.add(kk[i]);});
    placed.push({word:entry.w,reading:entry.r,meaning:entry.m,cells:chosen.map(([r,c])=>({r,c}))});
  }
  const unused=p.filter(k=>!used.has(k)).sort(()=>Math.random()-.5);let ui=0;
  for(let r=0;r<5;r++)for(let c=0;c<5;c++)if(g[r][c]===null){g[r][c]=unused[ui++]||p[Math.floor(Math.random()*p.length)];}
  return{grid:g,words:placed};
}

// ─── VALIDATION ───
// 判定順: ① グリッド配置語（submit()内） → ② Wiktionary → ③ Jisho
//
// なぜWiktionary？
//   - CORS完全対応（origin=* で file:// からも動く）
//   - 日本語の語彙をほぼ網羅（手動登録不要）
//   - 無料・APIキー不要・永久無料
//
// Jishoは読み・意味の取得のみ使用（バリデーションには使わない）

async function validate(word){
  // Wiktionary で語の存在確認（メイン判定）
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),5000);
    const res=await fetch(
      `https://ja.wiktionary.org/w/api.php?action=query&prop=info&titles=${encodeURIComponent(word)}&format=json&origin=*`,
      {signal:ctrl.signal}
    );
    clearTimeout(tid);
    const data=await res.json();
    const pages=data.query?.pages||{};
    const page=Object.values(pages)[0];
    const exists=page&&page.pageid&&page.pageid>0;

    if(exists){
      // 語が存在 → Jishoで読み・意味を取得（ベストエフォート）
      const detail=await getJishoDetail(word);
      return{valid:true,reading:detail?.reading||'',meaning:detail?.meaning||''};
    }
    // Wiktionaryにページなし → Jishoでも確認（2重チェック）
    const jisho=await getJishoDetail(word);
    if(jisho?.found){return{valid:true,reading:jisho.reading,meaning:jisho.meaning};}
    return{valid:false};
  }catch(e){
    // Wiktionary失敗 → Jishoにフォールバック
    const jisho=await getJishoDetail(word);
    if(jisho?.found){return{valid:true,reading:jisho.reading,meaning:jisho.meaning};}
    return{valid:false};
  }
}

// Jisho から読み・意味を取得（バリデーションには使わない）
async function getJishoDetail(word){
  try{
    const res=await fetch(`https://jisho.org/api/v1/search/words?keyword=${encodeURIComponent(word)}`);
    if(!res.ok)return null;
    const data=await res.json();
    const results=data.data||[];
    let match=results.find(r=>r.japanese?.some(j=>j.word===word));
    if(!match)match=results.find(r=>r.slug===word);
    if(!match&&results[0]?.japanese?.[0]?.word===word)match=results[0];
    if(match){
      const jap=match.japanese?.find(j=>j.word===word)||match.japanese?.[0];
      const meaning=match.senses?.[0]?.english_definitions?.slice(0,2).join(', ')||'';
      return{found:true,reading:jap?.reading||'',meaning};
    }
    return null;
  }catch(e){return null;}
}

function cellAt(x,y){const el=document.elementFromPoint(x,y);const c=el?.closest('[data-r]');if(!c)return null;return{r:+c.dataset.r,c:+c.dataset.c};}
function tryAdd(r,c){
  if(!isV(r,c)||sel.some(s=>s.r===r&&s.c===c))return;
  if(!sel.length){sel=[{r,c}];selDir=null;ref();updWD();return;}
  if(sel.length===1){const dr=r-sel[0].r,dc=c-sel[0].c;if(Math.abs(dr)>1||Math.abs(dc)>1||(dr===0&&dc===0))return;selDir=[dr,dc];sel.push({r,c});ref();updWD();return;}
  if(!selDir)return;const last=sel[sel.length-1];if(last.r+selDir[0]!==r||last.c+selDir[1]!==c)return;
  sel.push({r,c});ref();updWD();
}
function ref(){
  const el=document.getElementById('kg');if(!el)return;
  el.querySelectorAll('.kc').forEach(cell=>{
    const r=+cell.dataset.r,c=+cell.dataset.c;
    const isSel=sel.some(s=>s.r===r&&s.c===c);
    const isGU=fWords.some(w=>w.gu&&w.cells?.some(cs=>cs.r===r&&cs.c===c));

    if(isSel)cell.className='kc sel';else if(isGU)cell.className='kc gc';else if(isF)cell.className='kc fc';else cell.className='kc';
  });

function ePD(e){if(e.pointerType==='touch')return;e.preventDefault();isDrag=true;sel=[];selDir=null;const c=cellAt(e.clientX,e.clientY);if(c)tryAdd(c.r,c.c);}

function ePU(e){if(e.pointerType==='touch')return;if(!isDrag)return;isDrag=false;submit();}
function eTS(e){e.preventDefault();const t=e.touches[0];isDrag=true;sel=[];selDir=null;const c=cellAt(t.clientX,t.clientY);if(c)tryAdd(c.r,c.c);}
function eTM(e){e.preventDefault();if(!isDrag)return;const t=e.touches[0];const c=cellAt(t.clientX,t.clientY);if(c)tryAdd(c.r,c.c);}

// ─── SUBMIT ───
async function submit(){
  const s=[...sel];sel=[];selDir=null;ref();
  if(s.length<2||!G||isVal){setWD('hint','漢字を直線でなぞって単語を作ろう');return;}
  const word=s.map(({r,c})=>G[r][c]).join('').trim();
  if(!word||word.length<2){setWD('hint','漢字を直線でなぞって単語を作ろう');return;}
  if(fWords.some(w=>w.word===word)){showFbk('err',word,null,'すでに見つけています！');setWD('hint','漢字を直線でなぞって単語を作ろう');return;}
  // ① グリッド内の既知語
  const known=kWords.find(w=>w.word===word);
  if(known){accept({word,reading:known.reading,meaning:known.meaning,cells:s});return;}
  setWD('load',`「${word}」を確認中...`);isVal=true;
  // ② DICT + Jisho (validate関数内で順番に確認)
  const v=await validate(word);
  isVal=false;
  if(v.valid){accept({word,reading:v.reading,meaning:v.meaning,cells:s});}
  else{
    const msg=v.src==='error'?'オフラインのため確認できませんでした':'単語として認識されませんでした';
    playSFX('ng');showFbk('err',word,null,msg);setWD('hint','漢字を直線でなぞって単語を作ろう');
  }
}

  fWords.push(wd);ref();playSFX('ok');showFbk('ok',wd.word,wd.reading,wd.meaning);setWD('hint','漢字を直線でなぞって単語を作ろう');
  updProg();addChip(wd);
  if(fWords.filter(w=>!w.gu).length>=cStage.cw&&!givenUp){
    prog={u:Math.max(prog.u,cStage.id+1),c:[...new Set([...prog.c,cStage.id])]};saveP();
    setTimeout(()=>showComplete(false),700);
  }
}

// ─── WORD MODAL ───
const POS_JA={'Noun':'名詞','Suru verb':'する動詞','Godan verb':'五段動詞','Ichidan verb':'一段動詞','Verb':'動詞','Na-adjective':'な形容詞','I-adjective':'い形容詞','Adjective':'形容詞','Adverb':'副詞','Expression':'表現・慣用句','Counter':'助数詞','Suffix':'接尾語','Prefix':'接頭語','Conjunction':'接続詞','Interjection':'感動詞','Pronoun':'代名詞','Numeric':'数詞'};
function posJa(pos){if(!pos)return'';for(const[en,ja]of Object.entries(POS_JA)){if(pos.toLowerCase().includes(en.toLowerCase()))return ja;}return pos;}

async function fetchWordFull(word){
  try{
    const res=await fetch(`https://jisho.org/api/v1/search/words?keyword=${encodeURIComponent(word)}`);
    if(!res.ok)return null;
    const data=await res.json();
    const result=(data.data||[]).find(r=>r.japanese?.some(j=>j.word===word))||data.data?.[0];
    if(!result)return null;
    const jap=result.japanese?.find(j=>j.word===word)||result.japanese?.[0];
    return{
      reading:jap?.reading||'',
      jlpt:result.jlpt?.[0]?.replace('jlpt-','').toUpperCase()||'',
      isCommon:result.is_common||false,
      senses:(result.senses||[]).slice(0,4).map(s=>({
        meanings:s.english_definitions?.join('; ')||'',
        pos:s.parts_of_speech?.[0]||'',
        info:s.info?.join(', ')||'',
      })),
    };
  }catch(e){return null;}
}

async function fetchExamples(word){
  try{
    const res=await fetch(`https://tatoeba.org/en/api_v0/search?from=jpn&query=${encodeURIComponent(word)}&to=eng&limit=8`);
    if(!res.ok)return null;
    const data=await res.json();
    const filtered=(data.results||[]).filter(r=>r.text.includes(word)&&r.text.length<60);
    return filtered.slice(0,3).map(r=>({ja:r.text,en:r.translations?.[0]?.[0]?.text||''}));
  }catch(e){return null;}
}

async function openWM(wd){
  curW=wd;
  document.getElementById('wmw').textContent=wd.word;
  document.getElementById('wmr').textContent=wd.reading||'';
  document.getElementById('wmbadges').innerHTML='';
  document.getElementById('wmsenses').innerHTML=`<div class="ldg"><span class="sp"></span>読み込み中...</div>`;
  document.getElementById('wmexs').innerHTML=`<div class="ldg"><span class="sp"></span>例文を検索中...</div>`;
  document.getElementById('wmextlinks').innerHTML='';
  document.getElementById('wmod').classList.add('open');

  const[details,examples]=await Promise.all([fetchWordFull(wd.word),fetchExamples(wd.word)]);

  // 読み（より正確なものがあれば更新）
  if(details?.reading&&!wd.reading)document.getElementById('wmr').textContent=details.reading;

  // バッジ
  let badges='';
  if(details?.jlpt)badges+=`<span class="badge jlpt">${details.jlpt}</span>`;
  if(details?.isCommon)badges+=`<span class="badge common">よく使う語</span>`;
  document.getElementById('wmbadges').innerHTML=badges;

  // 意味・品詞
  if(details?.senses?.length){
    document.getElementById('wmsenses').innerHTML=details.senses.map(s=>`
      <div class="sense">
        ${s.pos?`<span class="pos">${posJa(s.pos)}</span>`:''}
        <span class="meaning">${s.meanings}</span>
        ${s.info?`<span class="sinfo">(${s.info})</span>`:''}
      </div>`).join('');
  }else{
    document.getElementById('wmsenses').innerHTML=wd.meaning
      ?`<div class="sense"><span class="meaning">${wd.meaning}</span></div>`
      :`<div class="no-data">オンライン接続時に表示されます</div>`;
  }

  // 例文
  if(examples?.length){
    document.getElementById('wmexs').innerHTML=examples.map(e=>`
      <div class="example">
        <div class="ex-ja">${e.ja.replace(wd.word,`<mark>${wd.word}</mark>`)}</div>
        ${e.en?`<div class="ex-en">${e.en}</div>`:''}
      </div>`).join('');
  }else{
    document.getElementById('wmexs').innerHTML=
      `<a class="ex-link" href="https://jisho.org/search/${encodeURIComponent(wd.word)}%23sentences" target="_blank" rel="noopener">Jisho.orgで例文を見る →</a>`;
  }

  // 外部リンク
  document.getElementById('wmextlinks').innerHTML=`
    <a class="extlink" href="https://jisho.org/search/${encodeURIComponent(wd.word)}" target="_blank" rel="noopener">🔗 Jisho</a>
    <a class="extlink" href="https://tatoeba.org/ja/sentences/search?from=jpn&to=eng&query=${encodeURIComponent(wd.word)}" target="_blank" rel="noopener">📚 Tatoeba例文</a>
    <a class="extlink" href="https://dictionary.goo.ne.jp/word/${encodeURIComponent(wd.word)}/" target="_blank" rel="noopener">📘 goo辞書</a>`;
}
function closeWM(){document.getElementById('wmod').classList.remove('open');}
async function cpWord(word){
  try{await navigator.clipboard.writeText(word);}
  catch{const t=document.createElement('textarea');t.value=word;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}
  showToast(`「${word}」をコピーしました`);
}
function cpCur(){if(curW)cpWord(curW.word);}
function svCur(){if(!curW)return;saveVoc(curW);}

// ─── VOCAB ───
function getVoc(){try{return JSON.parse(localStorage.getItem('kp_vocab')||'[]');}catch{return[];}}
function setVoc(v){try{localStorage.setItem('kp_vocab',JSON.stringify(v));}catch{}}
function saveVoc(wd){
  let voc=getVoc();if(voc.some(w=>w.word===wd.word)){showToast(`「${wd.word}」はすでに保存済みです`);return;}
  voc.unshift({word:wd.word,reading:wd.reading||'',meaning:wd.meaning||'',level:cStage?.level||'N5',savedAt:Date.now()});
  setVoc(voc);showToast(`💾「${wd.word}」を単語帳に保存しました！`);
}
function delVoc(word){setVoc(getVoc().filter(w=>w.word!==word));renderVoc();showToast(`「${word}」を削除しました`);}
function openVoc(){renderVoc();document.getElementById('voc').classList.add('open');}
function closeVoc(){document.getElementById('voc').classList.remove('open');}
function renderVoc(){
  const voc=getVoc();document.getElementById('vcnt').textContent=`(${voc.length}語)`;
  const body=document.getElementById('vbody');
  if(!voc.length){body.innerHTML=`<div class="vempty">📭 まだ保存した言葉がありません<br><br><small>単語チップをクリックして「💾 保存」で保存できます</small></div>`;return;}
  const byLv={};voc.forEach(w=>{if(!byLv[w.level])byLv[w.level]=[];byLv[w.level].push(w);});
  body.innerHTML=['N5','N4','N3','N2','N1'].filter(lv=>byLv[lv]).map(lv=>{
    const lc=LC[lv];
    const cards=byLv[lv].map(w=>`<div class="vcard"><div class="vm"><div><span class="vw">${w.word}</span> <span class="vr">${w.reading}</span></div><div class="vmm">${w.meaning}</div></div><div class="vcb"><button class="vcbtn" onclick="cpWord('${w.word}')">📋</button><a href="https://jisho.org/search/${encodeURIComponent(w.word)}" target="_blank" rel="noopener" style="text-decoration:none"><button class="vcbtn">🔗</button></a><button class="vcbtn vdel" onclick="delVoc('${w.word}')">🗑</button></div></div>`).join('');
    return`<div class="vlg"><div class="vll"><span class="lb" style="background:${lc}20;border-color:${lc}60;color:${lc}">${lv}</span>${byLv[lv].length}語</div>${cards}</div>`;
  }).join('');
}

// ─── TOAST ───
let toastT=null;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>{el.style.display='none';},2400);}

// ─── SCREEN ───
function showMap(){document.getElementById('cmod').classList.remove('open');document.getElementById('wmod').classList.remove('open');document.getElementById('game-screen').style.display='none';document.getElementById('map-screen').style.display='block';renderMap();}

// ─── AUDIO ───
let AC=null;
let bgmOn=localStorage.getItem('kp_bgm')!=='off';
let bgmTimer=null;
const PENTA=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25];

function getAC(){
  if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();
  return AC;
}

function playSFX(type){
  try{
    const ac=getAC();
    if(type==='ok'){
      [[523.25,0],[659.25,.1],[783.99,.2]].forEach(([f,d])=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);
        o.type='sine';o.frequency.value=f;
        const t=ac.currentTime+d;
        g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);
        o.start(t);o.stop(t+.6);
      });
    }else if(type==='ng'){
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.type='sawtooth';
      o.frequency.setValueAtTime(200,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(80,ac.currentTime+.18);
      g.gain.setValueAtTime(.15,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.22);
      o.start(ac.currentTime);o.stop(ac.currentTime+.25);
    }else if(type==='clear'){
      // クリア音: キラキラ上昇
      [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);
        o.type='sine';o.frequency.value=f;
        const t=ac.currentTime+i*.08;
        g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.6);
        o.start(t);o.stop(t+.7);
      });
    }
  }catch(e){}
}

function bgmNote(){
  if(!bgmOn)return;
  try{
    const ac=getAC();
    const f=PENTA[Math.floor(Math.random()*PENTA.length)]*(Math.random()>.7?2:1);
    const o=ac.createOscillator(),g=ac.createGain();
    const dl=ac.createDelay(1.5),dlg=ac.createGain();
    o.connect(g);g.connect(ac.destination);g.connect(dl);dl.connect(dlg);dlg.connect(ac.destination);
    dl.delayTime.value=.28;dlg.gain.value=.18;
    o.type='sine';o.frequency.value=f;
    const t=ac.currentTime,vol=.03+Math.random()*.035;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.12);g.gain.exponentialRampToValueAtTime(.001,t+2.8);
    o.start(t);o.stop(t+3.2);
  }catch(e){}
  if(bgmOn)bgmTimer=setTimeout(bgmNote,600+Math.random()*1200);
}

function startBGM(){if(bgmOn&&!bgmTimer){bgmNote();}}
function stopBGM(){if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}}

function toggleBGM(){
  bgmOn=!bgmOn;
  localStorage.setItem('kp_bgm',bgmOn?'on':'off');
  if(bgmOn){try{getAC();}catch(e){}startBGM();}else{stopBGM();}
  updateBGMBtn();
}

function updateBGMBtn(){
  document.querySelectorAll('.bgmbtn').forEach(btn=>{
    btn.textContent=bgmOn?'🔊 BGM':'🔇 BGM';
    btn.classList.toggle('off',!bgmOn);
  });
}

// タップ時にAudioContext を起動（ブラウザの自動再生制限回避）
document.addEventListener('pointerdown',()=>{
  if(bgmOn)try{getAC();if(!bgmTimer)startBGM();}catch(e){}
},{once:false,passive:true});

// ─── INIT ───
renderMap();
updateBGMBtn();
</script>
</body>
</html>
