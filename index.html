<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>漢字クロスパズル</title>
<style>
:root{
  --bg:#04060f;--bg2:#080d1e;--sur:#111827;--sur2:#1a2035;
  --bdr:#1e2d4a;--bdr2:#263352;
  --vio:#7c3aed;--viol:#a78bfa;--blu:#3b82f6;
  --grn:#10b981;--grnl:#6ee7b7;--gld:#d4a017;--gldl:#fcd34d;
  --red:#ef4444;--redl:#fca5a5;--amb:#f59e0b;--ambl:#fcd34d;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#475569;
  --N5:#10b981;--N4:#3b82f6;--N3:#f59e0b;--N2:#ef4444;--N1:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
  user-select:none;overflow-x:hidden}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes charBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes charWalk{0%,100%{transform:scaleX(1) translateY(0)}25%{transform:scaleX(1) translateY(-3px)}75%{transform:scaleX(1) translateY(-3px)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

/* ── SHARED ── */
.screen{display:none;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding:16px 14px}
.screen.active{display:flex}
.title-grad{background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399,#a78bfa);background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;
  font-size:clamp(22px,6vw,30px);font-weight:900;letter-spacing:1px;text-align:center}
.lb{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;border:1px solid;display:inline-block}
.sp{width:13px;height:13px;border:2px solid var(--vio);border-top-color:transparent;border-radius:50%;
  animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:5px}
.bgmbtn{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.35);border-radius:8px;
  color:#93c5fd;padding:6px 11px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.bgmbtn.off{opacity:.4;color:var(--txt3);border-color:var(--bdr)}
#toast{position:fixed;bottom:20px;left:50%;transform:translate(-50%,0);background:var(--sur2);
  border:1px solid var(--bdr2);border-radius:20px;padding:8px 18px;font-size:12px;color:var(--txt);
  z-index:500;display:none;white-space:nowrap;max-width:85vw;text-align:center}

/* ── LEVEL SELECT ── */
#level-screen{}
.ls-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.ls-subtitle{color:var(--txt3);font-size:11px;text-align:center;margin-bottom:20px}

/* Walk area */
.walk-area{position:relative;padding:30px 10px 16px;margin-bottom:4px}
.walk-path{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.walk-path::before{content:'';position:absolute;top:50%;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--bdr2),var(--bdr2));transform:translateY(-50%);z-index:0;border-radius:2px}
.wnode{width:56px;height:56px;border-radius:50%;border:2px solid;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;z-index:2;
  background:var(--bg2);flex-shrink:0;font-family:inherit}
.wnode:not(.locked):hover{transform:scale(1.1)}
.wnode.locked{cursor:not-allowed;opacity:.4}
.wnode.current{animation:pulse 2s infinite}
.wnode .wn-label{font-size:11px;font-weight:700}
.wnode .wn-prog{font-size:8px;opacity:.7;margin-top:1px}
.walk-char{position:absolute;font-size:22px;top:0;transition:left .2s ease-out;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.6));pointer-events:none;z-index:10}
.walk-char.idle{animation:charBob 1.5s ease-in-out infinite}
.walk-char.walking{animation:charWalk .2s ease-in-out infinite}

/* Level info card */
.info-card{background:var(--bg2);border-radius:14px;border:1px solid var(--bdr);padding:16px;margin-bottom:12px;animation:slideUp .2s ease}
.ic-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ic-emoji{font-size:28px}
.ic-title{font-size:17px;font-weight:700}
.ic-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.ic-progress{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ic-stage-dot{width:28px;height:28px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.ic-play-btn{width:100%;border:none;border-radius:10px;padding:11px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;background:linear-gradient(135deg,var(--vio),var(--blu));color:#fff;transition:opacity .2s}
.ic-play-btn:hover{opacity:.9}
.ic-locked{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--txt3);font-size:13px;padding:10px}

/* Stats row */
.stats-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);
  border-radius:10px;border:1px solid var(--bdr);padding:10px 14px;margin-bottom:8px}
.stat-label{color:var(--txt2);font-size:12px}
.stat-val{font-weight:700;font-size:13px}
.stat-bar-wrap{margin-top:6px}
.stat-bar{background:var(--sur2);border-radius:3px;height:4px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--vio),var(--grn));transition:width .6s}

/* ── STAGE SELECT ── */
#stage-screen{}
.ss-header{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.back-btn{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;color:var(--txt2);
  padding:7px 12px;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
.ss-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:20px}

.stage-walk-area{position:relative;padding:30px 6px 16px}
.stage-path{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.stage-path::before{content:'';position:absolute;top:50%;left:0;right:0;height:3px;
  background:var(--bdr2);transform:translateY(-50%);z-index:0;border-radius:2px}
.snode{width:52px;height:52px;border-radius:50%;border:2px solid;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;z-index:2;
  background:var(--bg2);flex-shrink:0;font-family:inherit}
.snode:not(.locked):hover{transform:scale(1.1)}
.snode.locked{cursor:not-allowed;opacity:.4}
.snode.current{animation:pulse 2s infinite}
.snode .sn-emoji{font-size:14px}
.snode .sn-num{font-size:8px;opacity:.7;margin-top:1px;font-weight:700}

.stage-info-card{background:var(--bg2);border-radius:14px;border:1px solid var(--bdr);padding:16px;
  margin-bottom:12px;animation:slideUp .2s ease}
.sic-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sic-emoji{font-size:24px}
.sic-title{font-size:16px;font-weight:700}
.sic-goal{font-size:12px;color:var(--txt2);margin-top:2px}
.sic-status{margin-bottom:10px}
.sic-play{width:100%;border:none;border-radius:10px;padding:10px;cursor:pointer;font-size:14px;
  font-weight:700;font-family:inherit;background:linear-gradient(135deg,var(--vio),var(--blu));color:#fff}

/* nav row */
.nav-row{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
.nav-btn{background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt2);
  padding:7px 16px;cursor:pointer;font-size:12px;font-family:inherit}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── GAME SCREEN ── */
#game-screen{}
.ghdr{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.bsm{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;color:var(--txt2);
  padding:7px 10px;cursor:pointer;font-size:12px;white-space:nowrap;font-family:inherit}
.bsm:hover{background:var(--sur2)}
.prog-wrap{background:var(--bg2);border-radius:8px;padding:7px 12px;border:1px solid var(--bdr);
  display:flex;align-items:center;gap:10px;margin-bottom:7px}
.prog-track{flex:1;background:var(--sur2);border-radius:3px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}
.wdisp{height:38px;background:var(--bg2);border-radius:8px;border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;margin-bottom:7px;
  font-size:20px;font-weight:700;letter-spacing:4px;transition:border-color .15s}
.wdisp.act{border-color:rgba(124,58,237,.6)}
.wdisp .ht{font-size:11px;color:var(--txt3);letter-spacing:0;font-weight:400}
#kg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:var(--bg2);border-radius:14px;
  padding:10px;border:1px solid var(--bdr);margin-bottom:7px;touch-action:none;cursor:crosshair}
.kc{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(15px,4.5vw,25px);
  font-weight:700;border-radius:8px;border:2px solid var(--bdr);background:var(--sur);color:var(--txt);
  transition:all .1s;cursor:crosshair}
.kc.sel{background:rgba(124,58,237,.3)!important;border-color:var(--vio)!important;color:var(--viol)!important;
  transform:scale(1.07)!important;box-shadow:0 0 12px rgba(124,58,237,.45)!important}
.kc.fc{background:rgba(16,185,129,.1)!important;border-color:rgba(16,185,129,.35)!important;color:var(--grnl)!important}
.kc.hc{background:rgba(212,160,23,.2)!important;border-color:var(--gld)!important;color:var(--gldl)!important;
  animation:pulse .8s infinite!important}
.kc.gc{background:rgba(239,68,68,.1)!important;border-color:rgba(239,68,68,.3)!important;color:var(--redl)!important}
.arow{display:flex;gap:6px;margin-bottom:7px}
.ab{flex:1;border:1px solid;border-radius:8px;padding:8px 6px;cursor:pointer;font-family:inherit;font-size:12px;
  font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.ab:disabled{opacity:.4;cursor:not-allowed}
.hb{background:rgba(212,160,23,.08);border-color:rgba(212,160,23,.4);color:var(--gldl)}.hb:not(:disabled):hover{background:rgba(212,160,23,.15)}
.gb{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.35);color:var(--redl)}.gb:not(:disabled):hover{background:rgba(239,68,68,.14)}
.fbk{border-radius:8px;padding:7px 12px;margin-bottom:7px;animation:slideUp .25s ease}
.fok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.35)}
.ferr{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.35)}
.fok .fw{font-size:17px;font-weight:700;color:var(--grnl)}.fok .fr{font-size:11px;color:var(--txt2);margin-left:6px}
.fok .fm{font-size:11px;color:var(--txt2);margin-top:2px}
.ferr .fe{color:var(--redl);font-size:12px}
.fwrap{background:var(--bg2);border-radius:8px;padding:8px 10px;border:1px solid var(--bdr)}
.fwlbl{color:var(--txt3);font-size:10px;margin-bottom:5px}
.fwchips{display:flex;flex-wrap:wrap;gap:5px}
.chip{border-radius:6px;padding:3px 7px;animation:pop .3s ease;display:flex;align-items:center;gap:5px;cursor:pointer}
.chip.n{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.35)}.chip.n:hover{background:rgba(16,185,129,.2)}
.chip.g{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25)}
.chip .cw{font-weight:700;font-size:14px}.chip.n .cw{color:var(--grnl)}.chip.g .cw{color:var(--redl)}
.chip .cr{font-size:9px;color:var(--txt3)}
.ccp{width:18px;height:18px;border:1px solid currentColor;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;opacity:.6;flex-shrink:0}.ccp:hover{opacity:1}
.gload{aspect-ratio:1;max-height:280px;background:var(--bg2);border-radius:14px;border:1px solid var(--bdr);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;margin-bottom:7px}
.bspin{width:38px;height:38px;border-width:3px;border-style:solid;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}

/* ── WORD MODAL ── */
#wmod{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
#wmod.open{display:flex}
.wmbox{background:var(--bg2);border-radius:18px;padding:22px 18px;max-width:340px;width:100%;border:1px solid var(--bdr2);animation:pop .3s ease;max-height:88vh;overflow-y:auto}
.wmw{font-size:36px;font-weight:900;color:var(--grnl);letter-spacing:2px}
.wmr{font-size:14px;color:var(--txt2);margin-top:2px}
.wmbadges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.badge{border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;border:1px solid}
.badge.jlpt{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.4);color:var(--viol)}
.badge.common{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:var(--grnl)}
.wmlbl{font-size:10px;color:var(--txt3);margin-top:12px;margin-bottom:4px}
.wmsenses{margin-top:0}
.sense{padding:6px 10px;background:var(--sur);border-radius:8px;border:1px solid var(--bdr);margin-bottom:4px}
.pos{font-size:9px;font-weight:700;color:var(--ambl);background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:4px;padding:1px 5px;margin-right:6px;vertical-align:middle}
.meaning{font-size:13px;color:var(--txt);line-height:1.5;vertical-align:middle}
.example{padding:8px 10px;background:var(--sur);border-radius:8px;border:1px solid var(--bdr);margin-bottom:5px}
.ex-ja{font-size:13px;color:var(--txt);line-height:1.7}.ex-ja mark{background:rgba(124,58,237,.3);color:var(--viol);border-radius:3px;padding:0 2px}
.ex-en{font-size:11px;color:var(--txt3);margin-top:3px}
.ex-link{display:block;padding:8px 12px;background:var(--sur);border-radius:8px;border:1px solid var(--bdr);color:var(--txt2);text-decoration:none;font-size:12px}
.wmextlinks{display:flex;gap:5px;margin-top:10px}
.extlink{flex:1;padding:6px 4px;border:1px solid var(--bdr);border-radius:8px;color:var(--txt2);text-decoration:none;font-size:10px;text-align:center;background:var(--sur)}
.wmbtns{display:flex;gap:7px;margin-top:14px}
.wmbtn{flex:1;border-radius:9px;padding:9px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;border:1px solid;transition:all .2s}
.wmcp{background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.4);color:#93c5fd}
.wmsv{background:rgba(212,160,23,.08);border-color:rgba(212,160,23,.4);color:var(--gldl)}
.wmcl{background:var(--sur2);border-color:var(--bdr);color:var(--txt2)}
.ldg{color:var(--txt3);font-size:12px;padding:8px 0;text-align:center}

/* ── VOCAB OVERLAY ── */
#voc{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;z-index:250}
#voc.open{display:flex}
.vhdr{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--bdr);background:var(--bg2);flex-shrink:0}
.vbody{flex:1;overflow-y:auto;padding:12px;max-width:480px;width:100%;margin:0 auto}
.vempty{text-align:center;color:var(--txt3);font-size:13px;margin-top:40px}
.vlg{margin-bottom:16px}
.vll{font-size:11px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.vcard{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px}
.vmn{flex:1;min-width:0}.vw{font-size:20px;font-weight:700;color:var(--grnl)}.vr{font-size:12px;color:var(--txt2)}.vmm{font-size:12px;color:var(--txt);margin-top:4px}
.vcb{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.vcbtn{border:1px solid var(--bdr);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:10px;background:transparent;color:var(--txt2);font-family:inherit}.vcbtn:hover{background:var(--sur2)}
.vdel{color:var(--redl);border-color:rgba(239,68,68,.3)}

/* ── COMPLETE MODAL ── */
#cmod{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:20px;overflow-y:auto}
#cmod.open{display:flex}
.cbox{background:var(--bg2);border-radius:20px;padding:20px 16px;width:100%;max-width:340px;border:1px solid var(--vio);box-shadow:0 0 40px rgba(124,58,237,.25);animation:pop .4s ease;margin:auto}
.cmod-sec{background:var(--sur);border-radius:10px;padding:8px;margin-bottom:10px;max-height:160px;overflow-y:auto}
.cmod-lbl{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:10px;color:var(--txt3)}
.saveall-btn{background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.35);color:var(--gldl);border-radius:6px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:inherit}
.cword-row{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;cursor:pointer;transition:background .15s;margin-bottom:3px}
.cword-row:hover{background:var(--sur2)}
.cwrd{font-weight:700;font-size:14px;color:var(--grnl)}.cword-row.g .cwrd{color:var(--redl)}.cword-row.missed .cwrd{color:var(--txt2)}
.crdr{font-size:9px;color:var(--txt3)}
.csavebtn{margin-left:auto;background:transparent;border:1px solid rgba(212,160,23,.3);border-radius:5px;color:var(--gldl);padding:2px 6px;cursor:pointer;font-size:10px;font-family:inherit;flex-shrink:0}
.csavebtn.saved{color:var(--grn);border-color:rgba(16,185,129,.3)}
.cbtns{display:flex;gap:6px}
.cmap{background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;color:var(--txt2);padding:9px 12px;cursor:pointer;font-size:12px;font-family:inherit}
.cnxt{background:linear-gradient(135deg,var(--vio),var(--blu));border:none;border-radius:10px;color:#fff;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.finb{background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.35);color:var(--viol)}
.finb:not(:disabled):hover{background:rgba(124,58,237,.18)}
.finb:disabled{opacity:.3}
.finb.can{background:rgba(124,58,237,.15);border-color:var(--viol);color:var(--viol)}
.finb.goal{background:linear-gradient(135deg,rgba(212,160,23,.2),rgba(124,58,237,.2));border-color:var(--gld);color:var(--gldl);animation:pulse 1.8s infinite}
.clear-banner{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3);border-radius:8px;padding:8px 12px;margin-bottom:7px;text-align:center;font-size:12px;color:var(--grnl);display:none}
</style>
</head>
<body>

<!-- ═══ LEVEL SELECT SCREEN ═══ -->
<div id="level-screen" class="screen active">
  <div class="ls-header">
    <div style="flex:1">
      <div class="title-grad">漢字クロスパズル</div>
    </div>
    <button class="bgmbtn" id="bgmbtn-ls" onclick="toggleBGM()">🔊 BGM</button>
  </div>
  <div class="ls-subtitle">JLPT N5 → N1 レベルを選んで冒険しよう</div>

  <div class="walk-area" id="level-walk">
    <div class="walk-path" id="level-path"></div>
    <div class="walk-char idle" id="level-char">🧑‍🎓</div>
  </div>

  <div id="level-info-card">
    <!-- JS で描画 -->
  </div>

  <div style="margin-top:auto">
    <div class="stats-row">
      <div>
        <div class="stat-label">総合進捗</div>
        <div class="stat-bar-wrap"><div class="stat-bar"><div class="stat-fill" id="stat-fill-ls" style="width:0%"></div></div></div>
      </div>

function pool(lvl){const i=LEVELS.indexOf(lvl);return LEVELS.slice(0,i+1).flatMap(l=>KP[l]);}
function cumWL(lvl){const i=LEVELS.indexOf(lvl);return LEVELS.slice(0,i+1).flatMap(l=>WL[l]||[]);}
function isV(r,c){return r>=0&&r<5&&c>=0&&c<5;}
function lvlStages(lvl){return STAGES.filter(s=>s.level===lvl);}
function lvlUnlocked(idx){
  if(idx===0)return true;
  const prev=LEVELS[idx-1];
  return lvlStages(prev).some(s=>prog.c.includes(s.id));
}
function stgStatus(id){
  if(prog.c.includes(id))return'done';
  if(id<=prog.u)return'unlocked';
  return'locked';
}
function findCells(word){
  if(!G)return null;
  for(let r=0;r<5;r++)for(let c=0;c<5;c++)for(const[dr,dc]of DIRS){
    let ok=true;const cells=[];
    for(let i=0;i<word.length;i++){const nr=r+dr*i,nc=c+dc*i;if(!isV(nr,nc)||G[nr][nc]!==word[i]){ok=false;break;}cells.push({r:nr,c:nc});}
    if(ok)return cells;
  }
  return null;
}

// AUDIO — 完全クリーン実装
// ════════════════════════════════════════════
let AC=null,bgmOn=localStorage.getItem('kp_bgm')!=='off';
let bgmRunning=false,bgmSched=null;
let bgmMI=0,bgmBI=0,bgmMT=0,bgmBT=0;

// 陽気なJRPG風メロディ C major 108BPM
const BPM=108,Q=60/BPM;
const MEL=[
  [523.25,1],[659.25,1],[783.99,2],
  [659.25,1],[587.33,1],[523.25,2],
  [392,1],[440,1],[523.25,1],[440,1],
  [392,4],
  [659.25,1],[783.99,1],[880,1],[783.99,1],
  [659.25,1],[587.33,1],[523.25,2],
  [440,1],[523.25,1],[587.33,1],[523.25,1],
  [523.25,4],
];
const BASS=[
  [130.81,2],[196,2],[130.81,2],[110,2],
  [130.81,2],[196,2],[164.81,2],[196,2],
];
// パーカッション: hi-hat タイミング(拍単位)
const HHAT_BEAT=0.5;
let bgmHT=0,bgmHTI=0;

function initAC(){
  if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
  return AC;
}
function note(freq,t,dur,vol,wave='triangle'){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=wave;o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.025);
    g.gain.setValueAtTime(vol*0.6,t+dur-0.06);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+0.06);
  }catch(e){}
}
function hihat(t,vol=0.022){
  try{
    const buf=AC.createBuffer(1,Math.round(AC.sampleRate*0.04),AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,4);
    const s=AC.createBufferSource(),g=AC.createGain();
    s.buffer=buf;s.connect(g);g.connect(AC.destination);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
    s.start(t);s.stop(t+0.05);
  }catch(e){}
}
function bgmSchedule(){
  if(!bgmRunning)return;
  const LA=0.22,now=AC.currentTime;
  while(bgmMT<now+LA){
    const[f,d]=MEL[bgmMI%MEL.length];
    if(f>0)note(f,bgmMT,d*Q*0.78,0.09);
    bgmMT+=d*Q;bgmMI++;
  }
  while(bgmBT<now+LA){
    const[f,d]=BASS[bgmBI%BASS.length];
    if(f>0)note(f,bgmBT,d*Q*0.55,0.048,'sine');
    bgmBT+=d*Q;bgmBI++;
  }
  while(bgmHT<now+LA){
    hihat(bgmHT,0.018);
    bgmHT+=HHAT_BEAT*Q;bgmHTI++;
  }
  bgmSched=setTimeout(bgmSchedule,22);
}
function startBGM(){
  if(bgmRunning)return;
  try{
    initAC();
    const go=()=>{
      bgmRunning=true;
      bgmMT=AC.currentTime+0.1;bgmBT=AC.currentTime+0.1;bgmHT=AC.currentTime+0.1;
      bgmMI=0;bgmBI=0;bgmHTI=0;
      bgmSchedule();
    };
    AC.state==='suspended'?AC.resume().then(go):go();
  }catch(e){}
}
function stopBGM(){
  bgmRunning=false;
  if(bgmSched){clearTimeout(bgmSched);bgmSched=null;}
}
function toggleBGM(){
  bgmOn=!bgmOn;
  localStorage.setItem('kp_bgm',bgmOn?'on':'off');
  bgmOn?startBGM():stopBGM();
  updateBGMBtns();
}
function updateBGMBtns(){
  document.querySelectorAll('.bgmbtn').forEach(b=>{
    b.textContent=bgmOn?'🔊 BGM':'🔇 BGM';
    b.classList.toggle('off',!bgmOn);
  });
}
// SFX
function sfx(type){
  try{
    initAC();const now=AC.currentTime;
    if(type==='ok'){
      [[523.25,0],[659.25,.1],[783.99,.2]].forEach(([f,d])=>{
        note(f,now+d,.5,.18,'sine');
      });
    }else if(type==='ng'){
      note(200,now,.08,.12,'sawtooth');
      note(140,now+.06,.14,.12,'sawtooth');
    }else if(type==='clear'){
      [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=>note(f,now+i*.09,.65,.16,'sine'));
    }
  }catch(e){}
}
let bgmTouched=false;
document.addEventListener('pointerdown',()=>{
  if(!bgmTouched&&bgmOn){bgmTouched=true;try{initAC();AC.state==='suspended'?AC.resume().then(startBGM):startBGM();}catch(e){}}
},{passive:true});

// GRID GENERATION
// ════════════════════════════════════════════
function buildGrid(stage){
  const p=pool(stage.level);
  const wlist=cumWL(stage.level).filter(e=>e.w.split('').every(k=>p.includes(k)));
  const shuffled=[...wlist].sort(()=>Math.random()-.5);
  const g=Array(5).fill(null).map(()=>Array(5).fill(null));
  const used=new Set();const placed=[];
  for(const entry of shuffled){
    if(placed.length>=8)break;
    const kk=[...entry.w];
    if(kk.some(k=>used.has(k)))continue;
    const spots=[];
    for(let r=0;r<5;r++)for(let c=0;c<5;c++)for(const[dr,dc]of DIRS){
      const cells=[];let ok=true;
      for(let i=0;i<kk.length;i++){const nr=r+dr*i,nc=c+dc*i;if(!isV(nr,nc)||(g[nr][nc]!==null&&g[nr][nc]!==kk[i])){ok=false;break;}cells.push([nr,nc]);}
      if(ok)spots.push(cells);
    }
    if(!spots.length)continue;
    const chosen=spots[Math.floor(Math.random()*spots.length)];
    chosen.forEach(([nr,nc],i)=>{g[nr][nc]=kk[i];used.add(kk[i]);});
    placed.push({word:entry.w,reading:entry.r,meaning:entry.m,cells:chosen.map(([r,c])=>({r,c}))});
  }
  const unused=p.filter(k=>!used.has(k)).sort(()=>Math.random()-.5);let ui=0;
  for(let r=0;r<5;r++)for(let c=0;c<5;c++)if(g[r][c]===null){g[r][c]=unused[ui++]||p[Math.floor(Math.random()*p.length)];}
  return{grid:g,words:placed};
}

// ════════════════════════════════════════════
// VALIDATION (Wiktionary + Jisho)
// ════════════════════════════════════════════
async function validate(word){
  try{
    const res=await fetch(`https://ja.wiktionary.org/w/api.php?action=query&prop=info&titles=${encodeURIComponent(word)}&format=json&origin=*`);
    const data=await res.json();
    const page=Object.values(data.query?.pages||{})[0];
    if(page?.pageid>0){
      const detail=await getJishoDetail(word);
      return{valid:true,reading:detail?.reading||'',meaning:detail?.meaning||''};
    }
    const jisho=await getJishoDetail(word);
    if(jisho?.found)return{valid:true,reading:jisho.reading,meaning:jisho.meaning};
    return{valid:false};
  }catch(e){
    const jisho=await getJishoDetail(word);
    if(jisho?.found)return{valid:true,reading:jisho.reading,meaning:jisho.meaning};
    return{valid:false};
  }
}
async function getJishoDetail(word){
  try{
    const res=await fetch(`https://jisho.org/api/v1/search/words?keyword=${encodeURIComponent(word)}`);
    if(!res.ok)return null;
    const data=await res.json();
    const match=(data.data||[]).find(r=>r.japanese?.some(j=>j.word===word))||(data.data||[])[0];
    if(!match)return null;
    const jap=match.japanese?.find(j=>j.word===word)||match.japanese?.[0];
    return{found:true,reading:jap?.reading||'',meaning:match.senses?.[0]?.english_definitions?.slice(0,2).join(', ')||''};
  }catch(e){return null;}
}

function tryAdd(r,c){
  if(!isV(r,c)||sel.some(s=>s.r===r&&s.c===c))return;
  if(!sel.length){sel=[{r,c}];selDir=null;ref();updWD();return;}
  if(sel.length===1){const dr=r-sel[0].r,dc=c-sel[0].c;if(Math.abs(dr)>1||Math.abs(dc)>1||(dr===0&&dc===0))return;selDir=[dr,dc];sel.push({r,c});ref();updWD();return;}
  if(!selDir)return;const last=sel[sel.length-1];if(last.r+selDir[0]!==r||last.c+selDir[1]!==c)return;
  sel.push({r,c});ref();updWD();
}
function ref(){
  const el=document.getElementById('kg');if(!el)return;
  el.querySelectorAll('.kc').forEach(cell=>{
    const r=+cell.dataset.r,c=+cell.dataset.c;
    const isSel=sel.some(s=>s.r===r&&s.c===c);
    const isGU=fWords.some(w=>w.gu&&w.cells?.some(cs=>cs.r===r&&cs.c===c));
    const isF=fWords.some(w=>w.cells?.some(cs=>cs.r===r&&cs.c===c));
    if(isSel)cell.className='kc sel';else if(isGU)cell.className='kc gc';else if(isF)cell.className='kc fc';else cell.className='kc';
  });
}
function cancelSel(){sel=[];selDir=null;isDrag=false;ref();setWD('hint','漢字を直線でなぞって単語を作ろう');}
function ePD(e){if(e.pointerType==='touch')return;e.preventDefault();isDrag=true;sel=[];selDir=null;const c=cellAt(e.clientX,e.clientY);if(c)tryAdd(c.r,c.c);}
function ePM(e){if(e.pointerType==='touch'||!isDrag)return;e.preventDefault();const c=cellAt(e.clientX,e.clientY);if(c)tryAdd(c.r,c.c);}
function ePU(e){if(e.pointerType==='touch')return;if(!isDrag)return;isDrag=false;submit();}
function eTS(e){e.preventDefault();const t=e.touches[0];isDrag=true;sel=[];selDir=null;const c=cellAt(t.clientX,t.clientY);if(c)tryAdd(c.r,c.c);}
function eTM(e){e.preventDefault();if(!isDrag)return;const t=e.touches[0];const c=cellAt(t.clientX,t.clientY);if(c)tryAdd(c.r,c.c);}
function eTE(e){e.preventDefault();if(!isDrag)return;isDrag=false;submit();}
function setWD(type,text){
  const el=document.getElementById('wd');el.classList.toggle('act',type==='w');
  if(type==='hint')el.innerHTML=`<span class="ht">${text}</span>`;
  else if(type==='load')el.innerHTML=`<span style="color:var(--txt3);font-size:13px"><span class="sp"></span>${text}</span>`;
  else el.innerHTML=`<span style="color:var(--viol);font-size:20px;font-weight:700;letter-spacing:4px">${text}</span>`;
}
function updWD(){if(!G||!sel.length){setWD('hint','漢字を直線でなぞって単語を作ろう');return;}const w=sel.map(({r,c})=>G[r][c]).join('');const lc=LC[cStage?.level]||'var(--vio)';document.getElementById('wd').classList.add('act');document.getElementById('wd').innerHTML=`<span style="color:${lc};font-size:20px;font-weight:700;letter-spacing:4px">${w}</span>`;}

async function submit(){
  const s=[...sel];sel=[];selDir=null;ref();
  if(s.length<2||!G||isVal){setWD('hint','漢字を直線でなぞって単語を作ろう');return;}
  const word=s.map(({r,c})=>G[r][c]).join('').trim();
  if(!word||word.length<2){setWD('hint','漢字を直線でなぞって単語を作ろう');return;}
  if(fWords.some(w=>w.word===word)){showFbk('err',word,null,'すでに見つけています！');setWD('hint','漢字を直線でなぞって単語を作ろう');return;}
  const known=kWords.find(w=>w.word===word);
  if(known){accept({word,reading:known.reading,meaning:known.meaning,cells:s});return;}
  setWD('load',`「${word}」を確認中...`);isVal=true;
  const v=await validate(word);
  isVal=false;
  if(v.valid)accept({word,reading:v.reading,meaning:v.meaning,cells:s});
  else{sfx('ng');showFbk('err',word,null,'単語として認識されませんでした');setWD('hint','漢字を直線でなぞって単語を作ろう');}
}
function accept(wd){
  fWords.push(wd);ref();sfx('ok');showFbk('ok',wd.word,wd.reading,wd.meaning);setWD('hint','漢字を直線でなぞって単語を作ろう');
  updProg();addChip(wd);
  updateFinBtn();
}
function updProg(){
  const found=fWords.length,total=Math.max(totW,found);
  document.getElementById('pfill').style.width=`${total>0?Math.min((found/total)*100,100):0}%`;
  document.getElementById('pf').textContent=found;document.getElementById('pt').textContent=total>0?total:'?';
  document.getElementById('pc').textContent=`目標:${cStage?.cw}語`;
  updateFinBtn();
}
function updateFinBtn(){
  const selfound=fWords.filter(w=>!w.gu).length;
  const btn=document.getElementById('finbtn');if(!btn)return;
  const MIN=3;
  btn.disabled=selfound<MIN;
  btn.className='ab finb'+(selfound>=cStage.cw?' goal':selfound>=MIN?' can':'');
  if(selfound===MIN&&MIN<cStage.cw)showToast(`💡 ${MIN}語達成！終了ボタンが使えます`);
  if(selfound===cStage.cw)showToast(`🎯 目標達成！いつでも終了できます`);
}
function addChip(wd){
  const wrap=document.getElementById('fwchips');const chip=document.createElement('div');
  chip.className=`chip ${wd.gu?'g':'n'}`;
  chip.innerHTML=`<span class="cw">${wd.word}</span><span class="cr">${wd.reading||''}</span><span class="ccp" onclick="event.stopPropagation();cpWord('${wd.word}')">📋</span>`;
  chip.addEventListener('click',()=>openWM(wd));
  wrap.appendChild(chip);document.getElementById('fwrap').style.display='block';
}
function showFbk(type,word,reading,msg){
  if(fbkTimer)clearTimeout(fbkTimer);const el=document.getElementById('fbkarea');
  if(type==='ok')el.innerHTML=`<div class="fbk fok"><div><span class="fw">✓ ${word}</span><span class="fr">${reading||''}</span></div>${msg?`<div class="fm">${msg}</div>`:''}</div>`;
  else el.innerHTML=`<div class="fbk ferr"><span class="fe">✗ <strong>${word}</strong> — ${msg}</span></div>`;
  fbkTimer=setTimeout(()=>{el.innerHTML='';},3500);
}
function doHint(){
  if(hLeft<=0||isVal)return;
  const unfound=kWords.filter(w=>!fWords.some(f=>f.word===w.word));
  if(!unfound.length){showToast('すべての言葉を発見済みです！');return;}
  const pick=unfound[Math.floor(Math.random()*unfound.length)];
  const cells=findCells(pick.word);
  if(!cells){showToast(`ヒント: ${pick.word.length}文字の言葉があります`);return;}
  hLeft--;document.getElementById('hleft').textContent=`(${hLeft}回)`;
  if(hLeft===0)document.getElementById('hbtn').disabled=true;
  const g=document.getElementById('kg');
  cells.forEach(({r,c})=>{g?.querySelector(`[data-r="${r}"][data-c="${c}"]`)?.classList.add('hc');});
  showToast(`💡 ${pick.word.length}文字の言葉があります`);
  if(hTimer)clearTimeout(hTimer);
  hTimer=setTimeout(()=>{cells.forEach(({r,c})=>{document.getElementById('kg')?.querySelector(`[data-r="${r}"][data-c="${c}"]`)?.classList.remove('hc');});ref();},3000);
}
function doFinish(){
  const selfound=fWords.filter(w=>!w.gu).length;
  if(selfound<3){showToast('あと'+(3-selfound)+'語見つけてから終了できます');return;}
  prog={u:Math.max(prog.u,cStage.id+1),c:[...new Set([...prog.c,cStage.id])]};saveP();
  showComplete(false);
}
function doGiveUp(){
  if(givenUp)return;if(!confirm('ギブアップしますか？残りの言葉が表示されます。'))return;
  givenUp=true;document.getElementById('gubtn').disabled=true;
  kWords.filter(w=>!fWords.some(f=>f.word===w.word)).forEach(w=>{
    const cells=findCells(w.word)||[];fWords.push({...w,cells,gu:true});addChip({...w,cells,gu:true});
  });
  ref();updProg();prog={u:Math.max(prog.u,cStage.id+1),c:[...new Set([...prog.c,cStage.id])]};saveP();
  setTimeout(()=>showComplete(true),500);
}

// ── COMPLETE MODAL ──
function showComplete(isGU){
  sfx('clear');
  document.getElementById('cemi').textContent=isGU?'🏳':'🎉';
  document.getElementById('ctitle').textContent=isGU?'ギブアップ…':'ステージクリア！';
  document.getElementById('ctitle').style.color=isGU?'var(--red)':'var(--viol)';
  const selfound=fWords.filter(w=>!w.gu).length;
  document.getElementById('csub').textContent=`S${cStage.id} ${cStage.name} — 自力で${selfound}語発見`;
  document.getElementById('cword-count').textContent=`見つけた言葉（${fWords.length}語）`;
  const vocab=getVoc();
  document.getElementById('cchips').innerHTML=fWords.map(w=>{
    const saved=vocab.some(v=>v.word===w.word);
    return`<div class="cword-row${w.gu?' g':''}" onclick="openWMFromComplete('${w.word}')">
      <span class="cwrd">${w.word}</span><span class="crdr">${w.reading||''}</span>
      <button class="csavebtn${saved?' saved':''}" onclick="event.stopPropagation();saveFromComplete('${w.word}',this)">${saved?'✓':'💾'}</button>
    </div>`;
  }).join('');
  const missed=kWords.filter(w=>!fWords.some(f=>f.word===w.word));
  const mEl=document.getElementById('cmissed');
  if(missed.length>0){
    mEl.style.display='block';
    document.getElementById('cmissed-list').innerHTML=missed.map(w=>
      `<div class="cword-row missed" onclick="openWMFromComplete('${w.word}')"><span class="cwrd">${w.word}</span><span class="crdr">${w.reading||''}</span><span style="margin-left:auto;font-size:9px;color:var(--txt3)">${w.meaning||''}</span></div>`
    ).join('');
  }else{mEl.style.display='none';}
  const hasNext=cStage.id<25&&lvlStages(selectedLevel).some(s=>s.id===cStage.id+1)||STAGES.find(s=>s.id===cStage.id+1);
  document.getElementById('cnxt').style.display=cStage.id<25?'':'none';
  document.getElementById('cmod').classList.add('open');
}
function goNext(){
  document.getElementById('cmod').classList.remove('open');
  const next=STAGES.find(s=>s.id===cStage.id+1);
  if(next){
    // 同レベルか次のレベルか
    if(next.level===selectedLevel){beginStage(next.id);}
    else{selectedLevel=next.level;beginStage(next.id);}
  }else{backToStageSelect();}
}
function openWMFromComplete(word){const wd=fWords.find(w=>w.word===word)||kWords.find(w=>w.word===word);if(wd)openWM({...wd});}
function saveFromComplete(word,btn){const wd=[...fWords,...kWords].find(w=>w.word===word);if(!wd)return;saveVoc(wd,true);btn.textContent='✓';btn.classList.add('saved');}
function saveAllFound(){
  const vocab=getVoc();let cnt=0;
  fWords.forEach(w=>{if(!vocab.some(v=>v.word===w.word)){vocab.unshift({word:w.word,reading:w.reading||'',meaning:w.meaning||'',level:cStage?.level||'N5',savedAt:Date.now()});cnt++;}});
  setVoc(vocab);showToast(cnt>0?`💾 ${cnt}語を保存しました`:'すでに全語保存済みです');
  document.querySelectorAll('.csavebtn').forEach(b=>{b.textContent='✓';b.classList.add('saved');});
}
function openVocFromComplete(){document.getElementById('cmod').classList.remove('open');openVoc();}

// ════════════════════════════════════════════
// WORD MODAL
// ════════════════════════════════════════════
const POS_JA={'Noun':'名詞','Suru verb':'する動詞','Godan verb':'五段動詞','Ichidan verb':'一段動詞','Verb':'動詞','Na-adjective':'な形容詞','I-adjective':'い形容詞','Adjective':'形容詞','Adverb':'副詞','Expression':'表現','Counter':'助数詞','Suffix':'接尾語','Prefix':'接頭語','Conjunction':'接続詞','Interjection':'感動詞','Pronoun':'代名詞','Numeric':'数詞'};
function posJa(pos){if(!pos)return'';for(const[en,ja]of Object.entries(POS_JA)){if(pos.toLowerCase().includes(en.toLowerCase()))return ja;}return pos;}
async function fetchWordFull(word){
  try{const res=await fetch(`https://jisho.org/api/v1/search/words?keyword=${encodeURIComponent(word)}`);if(!res.ok)return null;const data=await res.json();const result=(data.data||[]).find(r=>r.japanese?.some(j=>j.word===word))||data.data?.[0];if(!result)return null;const jap=result.japanese?.find(j=>j.word===word)||result.japanese?.[0];return{reading:jap?.reading||'',jlpt:result.jlpt?.[0]?.replace('jlpt-','').toUpperCase()||'',isCommon:result.is_common||false,senses:(result.senses||[]).slice(0,4).map(s=>({meanings:s.english_definitions?.join('; ')||'',pos:s.parts_of_speech?.[0]||'',info:s.info?.join(', ')||''}))};
  }catch(e){return null;}
}
async function fetchExamples(word){
  try{const res=await fetch(`https://tatoeba.org/en/api_v0/search?from=jpn&query=${encodeURIComponent(word)}&to=eng&limit=8`);if(!res.ok)return null;const data=await res.json();const filtered=(data.results||[]).filter(r=>r.text.includes(word)&&r.text.length<60);return filtered.slice(0,3).map(r=>({ja:r.text,en:r.translations?.[0]?.[0]?.text||''}));}catch(e){return null;}
}
async function openWM(wd){
  curW=wd;
  document.getElementById('wmw').textContent=wd.word;
  document.getElementById('wmr').textContent=wd.reading||'';
  document.getElementById('wmbadges').innerHTML='';
  document.getElementById('wmsenses').innerHTML=`<div class="ldg"><span class="sp"></span>読み込み中...</div>`;
  document.getElementById('wmexs').innerHTML=`<div class="ldg"><span class="sp"></span>例文を検索中...</div>`;
  document.getElementById('wmextlinks').innerHTML='';
  document.getElementById('wmod').classList.add('open');
  const[details,examples]=await Promise.all([fetchWordFull(wd.word),fetchExamples(wd.word)]);
  if(details?.reading&&!wd.reading)document.getElementById('wmr').textContent=details.reading;
  let badges='';
  if(details?.jlpt)badges+=`<span class="badge jlpt">${details.jlpt}</span>`;
  if(details?.isCommon)badges+=`<span class="badge common">よく使う語</span>`;
  document.getElementById('wmbadges').innerHTML=badges;
  if(details?.senses?.length){document.getElementById('wmsenses').innerHTML=details.senses.map(s=>`<div class="sense">${s.pos?`<span class="pos">${posJa(s.pos)}</span>`:''}<span class="meaning">${s.meanings}</span>${s.info?`<span style="font-size:10px;color:var(--txt3);margin-left:4px;font-style:italic">(${s.info})</span>`:''}</div>`).join('');}
  else{document.getElementById('wmsenses').innerHTML=wd.meaning?`<div class="sense"><span class="meaning">${wd.meaning}</span></div>`:`<div class="ldg">意味を取得できませんでした</div>`;}
  if(examples?.length){document.getElementById('wmexs').innerHTML=examples.map(e=>`<div class="example"><div class="ex-ja">${e.ja.replace(wd.word,`<mark>${wd.word}</mark>`)}</div>${e.en?`<div class="ex-en">${e.en}</div>`:''}</div>`).join('');}
  else{document.getElementById('wmexs').innerHTML=`<a class="ex-link" href="https://jisho.org/search/${encodeURIComponent(wd.word)}%23sentences" target="_blank" rel="noopener">Jisho.orgで例文を見る →</a>`;}
  document.getElementById('wmextlinks').innerHTML=`<a class="extlink" href="https://jisho.org/search/${encodeURIComponent(wd.word)}" target="_blank" rel="noopener">🔗 Jisho</a><a class="extlink" href="https://tatoeba.org/ja/sentences/search?from=jpn&to=eng&query=${encodeURIComponent(wd.word)}" target="_blank" rel="noopener">📚 例文</a><a class="extlink" href="https://dictionary.goo.ne.jp/word/${encodeURIComponent(wd.word)}/" target="_blank" rel="noopener">📘 goo辞書</a>`;
}
function closeWM(){document.getElementById('wmod').classList.remove('open');}
function returnToGrid(){
  document.getElementById('cmod').classList.remove('open');
  showScreen('game-screen');
  document.getElementById('clear-banner').style.display='block';
  // 終了ボタンを「もう一度終了」に変更（再クリア不要なので）
  const finbtn=document.getElementById('finbtn');
  if(finbtn){finbtn.disabled=false;finbtn.textContent='🗺 マップへ戻る';finbtn.onclick=()=>{backToStageSelect();};finbtn.className='ab can';}
  const gubtn=document.getElementById('gubtn');
  if(gubtn){gubtn.style.display='none';}
}
async function cpWord(word){try{await navigator.clipboard.writeText(word);}catch{const t=document.createElement('textarea');t.value=word;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}showToast(`「${word}」をコピーしました`);}
function cpCur(){if(curW)cpWord(curW.word);}
function svCur(){if(!curW)return;saveVoc(curW);}

// ════════════════════════════════════════════
// VOCAB
// ════════════════════════════════════════════
function getVoc(){try{return JSON.parse(localStorage.getItem('kp_vocab')||'[]');}catch{return[];}}
function setVoc(v){try{localStorage.setItem('kp_vocab',JSON.stringify(v));}catch{}}
function saveVoc(wd,silent=false){
  let voc=getVoc();if(voc.some(w=>w.word===wd.word)){if(!silent)showToast(`「${wd.word}」はすでに保存済みです`);return;}
  voc.unshift({word:wd.word,reading:wd.reading||'',meaning:wd.meaning||'',level:cStage?.level||'N5',savedAt:Date.now()});
  setVoc(voc);showToast(`💾「${wd.word}」を単語帳に保存しました！`);
}
function delVoc(word){setVoc(getVoc().filter(w=>w.word!==word));renderVoc();showToast(`「${word}」を削除しました`);}
function openVoc(){renderVoc();document.getElementById('voc').classList.add('open');}
function closeVoc(){document.getElementById('voc').classList.remove('open');}
function renderVoc(){
  const voc=getVoc();document.getElementById('vcnt').textContent=`(${voc.length}語)`;
  const body=document.getElementById('vbody');
  if(!voc.length){body.innerHTML=`<div class="vempty">📭 まだ保存した言葉がありません<br><small style="margin-top:8px;display:block">単語をクリックして「💾 保存」で保存できます</small></div>`;return;}
  const byLv={};voc.forEach(w=>{if(!byLv[w.level])byLv[w.level]=[];byLv[w.level].push(w);});
  body.innerHTML=LEVELS.filter(lv=>byLv[lv]).map(lv=>{
    const lc=LC[lv];
    const cards=byLv[lv].map(w=>`<div class="vcard"><div class="vmn"><div><span class="vw">${w.word}</span> <span class="vr">${w.reading}</span></div><div class="vmm">${w.meaning}</div></div><div class="vcb"><button class="vcbtn" onclick="cpWord('${w.word}')">📋</button><a href="https://jisho.org/search/${encodeURIComponent(w.word)}" target="_blank" rel="noopener" style="text-decoration:none"><button class="vcbtn">🔗</button></a><button class="vcbtn vdel" onclick="delVoc('${w.word}')">🗑</button></div></div>`).join('');
    return`<div class="vlg"><div class="vll"><span class="lb" style="background:${lc}20;border-color:${lc}60;color:${lc}">${lv}</span>${byLv[lv].length}語</div>${cards}</div>`;
  }).join('');
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
let toastT=null;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';el.style.animation='toastIn .2s ease';if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>{el.style.display='none';},2400);}

// ════════════════════════════════════════════
// KEYBOARD
// ════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(currentScreen==='levelSelect'){
    if(e.key==='ArrowRight')clickLevel(Math.min(lvlCharPos+1,4));
    else if(e.key==='ArrowLeft')clickLevel(Math.max(lvlCharPos-1,0));
    else if(e.key==='Enter')enterLevel(lvlCharPos);
  }else if(currentScreen==='stageSelect'){
    if(e.key==='ArrowRight')stageMove(1);
    else if(e.key==='ArrowLeft')stageMove(-1);
    else if(e.key==='Enter'){const stages=lvlStages(selectedLevel);beginStage(stages[stgCharPos].id);}
    else if(e.key==='Escape')showLevelSelect();
  }
});

// INIT
// ════════════════════════════════════════════
// レベルcharPosを最後の解放レベルに初期化
lvlCharPos=LEVELS.findLastIndex((_,i)=>lvlUnlocked(i));
if(lvlCharPos<0)lvlCharPos=0;
initLevelScreen();
updateBGMBtn();
function updateBGMBtn(){updateBGMBtns();}
